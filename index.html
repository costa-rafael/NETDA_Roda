<!DOCTYPE html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>Roda dos Cursos | Iscte-Sintra</title>
    <meta name="description" content="Explora os cursos da Escola de Tecnologias Digitais Aplicadas (Iscte-Sintra) através de uma experiência interativa e imersiva." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Outfit', sans-serif; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Roda dos Cursos</h1>
        <p class="subtitle">Descobre os desafios de cada licenciatura</p>
      </header>

      <div class="wheel-container">
        <div class="wheel-indicator">
          <svg viewBox="0 0 40 50" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 50L0 0H40L20 50Z" fill="var(--primary-color)"/>
          </svg>
        </div>
        <div class="wheel-inner" id="wheel">
          <svg id="wheel-svg" viewBox="0 0 100 100">
            <!-- Segments will be injected by JS -->
          </svg>
          <div class="wheel-center"></div>
        </div>
      </div>



      <!-- Challenge Overlay -->
      <div id="challenge-overlay" class="overlay">
        <div class="challenge-card" id="card">
          <span class="challenge-type" id="type-label">DESAFIO</span>
          <h2 class="challenge-course" id="course-name">Nome do Curso</h2>
          <p class="challenge-question" id="question-text">A carregar pergunta...</p>
          
          <div id="options-container" class="options-grid">
            <!-- Buttons injected by JS -->
          </div>

          <p id="feedback-msg" class="feedback-msg"></p>
          
          <div class="controls-action">
            <button id="submit-btn" class="primary">RESPONDER</button>
            <button id="next-btn" class="primary" style="display: none;">PRÓXIMO</button>
          </div>
        </div>
      </div>

      <!-- Reward Modal (Hidden initially) -->
      <div id="reward-overlay" class="overlay">
        <div class="challenge-card">
          <span class="challenge-type">PARABÉNS!</span>
          <h2>Desafio Concluído</h2>
          <div class="reward-visual">
            <span class="reward-icon">🏆</span>
            <p>Conseguiste a tua</p>
            <h3 style="color: var(--primary-color);">Ficha de Recompensa</h3>
          </div>
          <p style="margin-bottom: 2rem;">Mostra este ecrã à nossa equipa no stand.</p>
          <button id="restart-btn" class="primary">RODAR NOVAMENTE</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
